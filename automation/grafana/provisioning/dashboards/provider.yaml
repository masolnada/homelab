apiVersion: 1

providers:
  - name: homelab
    folder: Zigbee
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    # Edits in the UI stick until the file on disk changes again.
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
