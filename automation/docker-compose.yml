services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    environment:
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
    # Renders the password file from the environment at start; the image has
    # no env substitution of its own.
    command: >
      sh -c 'rm -f /mosquitto/passwd
      && mosquitto_passwd -c -b /mosquitto/passwd "$$MQTT_USERNAME" "$$MQTT_PASSWORD"
      && chown mosquitto:mosquitto /mosquitto/passwd
      && chmod 0600 /mosquitto/passwd
      && exec mosquitto -c /mosquitto/config/mosquitto.conf'
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    networks:
      - proxy_net

  esphome:
    image: ghcr.io/esphome/esphome:latest
    container_name: esphome
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE}
      # mDNS does not cross the bridge network; check device reachability by
      # ping instead (was usePing on the old NixOS host).
      - ESPHOME_DASHBOARD_USE_PING=true
    volumes:
      - esphome_config:/config
    networks:
      - proxy_net

  z2m-baixos:
    image: ghcr.io/koenkk/zigbee2mqtt:2.6.2
    container_name: z2m-baixos
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      - TZ=${TIMEZONE}
      # Skip the first-boot onboarding UI; config comes from the env vars below.
      - Z2M_ONBOARD_NO_SERVER=1
      # SLZB-06P7 network coordinator "zb-coord-baixos" (CC2652P7 → zstack, TCP)
      - ZIGBEE2MQTT_CONFIG_SERIAL_PORT=tcp://10.0.20.6:6638
      - ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER=zstack
      - ZIGBEE2MQTT_CONFIG_MQTT_SERVER=mqtt://mosquitto:1883
      - ZIGBEE2MQTT_CONFIG_MQTT_USER=${MQTT_USERNAME}
      - ZIGBEE2MQTT_CONFIG_MQTT_PASSWORD=${MQTT_PASSWORD}
      - ZIGBEE2MQTT_CONFIG_MQTT_BASE_TOPIC=zigbee2mqtt-baixos
      - ZIGBEE2MQTT_CONFIG_FRONTEND_ENABLED=true
      - ZIGBEE2MQTT_CONFIG_FRONTEND_PORT=8080
      # Raw MQTT JSON only — no Home Assistant discovery.
      - ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED=false
      # Per-coordinator network identity. Concrete values in .env — never
      # GENERATE here: env overrides re-apply every boot and would re-form
      # the network (orphaning all paired devices) on each restart.
      - ZIGBEE2MQTT_CONFIG_ADVANCED_NETWORK_KEY=${Z2M_BAIXOS_NETWORK_KEY}
      - ZIGBEE2MQTT_CONFIG_ADVANCED_PAN_ID=${Z2M_BAIXOS_PAN_ID}
      - ZIGBEE2MQTT_CONFIG_ADVANCED_EXT_PAN_ID=${Z2M_BAIXOS_EXT_PAN_ID}
    volumes:
      - z2m_baixos_data:/app/data
    networks:
      - proxy_net

  z2m-pis:
    image: ghcr.io/koenkk/zigbee2mqtt:2.6.2
    container_name: z2m-pis
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      - TZ=${TIMEZONE}
      # Skip the first-boot onboarding UI; config comes from the env vars below.
      - Z2M_ONBOARD_NO_SERVER=1
      # SLZB-06P7 network coordinator "zb-coord-pis" (CC2652P7 → zstack, TCP)
      - ZIGBEE2MQTT_CONFIG_SERIAL_PORT=tcp://10.0.20.5:6638
      - ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER=zstack
      - ZIGBEE2MQTT_CONFIG_MQTT_SERVER=mqtt://mosquitto:1883
      - ZIGBEE2MQTT_CONFIG_MQTT_USER=${MQTT_USERNAME}
      - ZIGBEE2MQTT_CONFIG_MQTT_PASSWORD=${MQTT_PASSWORD}
      - ZIGBEE2MQTT_CONFIG_MQTT_BASE_TOPIC=zigbee2mqtt-pis
      - ZIGBEE2MQTT_CONFIG_FRONTEND_ENABLED=true
      - ZIGBEE2MQTT_CONFIG_FRONTEND_PORT=8080
      # Raw MQTT JSON only — no Home Assistant discovery.
      - ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED=false
      # Per-coordinator network identity. Concrete values in .env — never
      # GENERATE here: env overrides re-apply every boot and would re-form
      # the network (orphaning all paired devices) on each restart.
      - ZIGBEE2MQTT_CONFIG_ADVANCED_NETWORK_KEY=${Z2M_PIS_NETWORK_KEY}
      - ZIGBEE2MQTT_CONFIG_ADVANCED_PAN_ID=${Z2M_PIS_PAN_ID}
      - ZIGBEE2MQTT_CONFIG_ADVANCED_EXT_PAN_ID=${Z2M_PIS_EXT_PAN_ID}
      # Baixos sits on the default channel 11; keep the two networks apart.
      - ZIGBEE2MQTT_CONFIG_ADVANCED_CHANNEL=15
    volumes:
      - z2m_pis_data:/app/data
    networks:
      - proxy_net

  ring-mqtt:
    image: tsightler/ring-mqtt:5.9.3
    container_name: ring-mqtt
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      - TZ=${TIMEZONE}
    # /data holds config.json (mqtt_url, credentials, device options) and
    # ring-state.json (refresh token — rotated and rewritten by the container
    # itself on every use, never touched via env vars). See README for the
    # one-time interactive setup that populates this volume.
    volumes:
      - ring_data:/data
    networks:
      - proxy_net

  mqtt-rules:
    image: eclipse-mosquitto:2
    container_name: mqtt-rules
    restart: unless-stopped
    depends_on:
      - mosquitto
      - ring-mqtt
    environment:
      - TZ=${TIMEZONE}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - RING_LOCATION_ID=${RING_LOCATION_ID}
      - RING_INTERCOM_ID=${RING_INTERCOM_ID}
    # Two standing rules, no rules engine: entrance-button -> intercom unlock,
    # and Ring ding -> the basement chime. Shell vars are written $$VAR so
    # compose passes them through instead of interpolating them itself.
    #
    # Neither trigger topic is retained (verified: subscribing to 'ring/#' fresh
    # yields nothing, and ring-mqtt sets no retain flag anywhere), and both
    # subscriptions use a clean session, so nothing is replayed at subscribe
    # time. A doorbell press is a real-time event: one that happened while this
    # sidecar was down must never ring the bell later, which is why the session
    # is deliberately not persistent.
    #
    # ring-mqtt publishes the ding edge-only — ON, then OFF exactly 20s later —
    # and never republishes, so the rule must not depend on having seen the OFF.
    # It chimes on any ON with a 15s cooldown instead: shorter than the 20s
    # auto-clear, so a genuine second ding still rings, and stateless, so a
    # missed message cannot wedge the chime off permanently.
    command:
      - /bin/sh
      - -c
      - |
        set -u
        BUTTON_TOPIC="zigbee2mqtt-pis/entrance-button"
        CHIME_TOPIC="timbre_baixos/ring"
        DING_TOPIC="ring/$${RING_LOCATION_ID}/intercom/$${RING_INTERCOM_ID}/ding/state"
        LOCK_TOPIC="ring/$${RING_LOCATION_ID}/intercom/$${RING_INTERCOM_ID}/lock/command"

        # QoS 1 both ways. Outbound, timbre-baixos holds a persistent session so
        # the broker retries a lossy delivery instead of discarding it as QoS 0
        # did; inbound, QoS 1 makes the broker retransmit a ding it could not
        # hand over first time rather than dropping it silently.
        #
        # The chime payload is the publisher's epoch timestamp, not a fixed
        # word: timbre-baixos drops any ring older than 30s, so a queued one
        # cannot wake the house minutes after whoever pressed the bell left.
        pub() {
          mosquitto_pub -h mosquitto -p 1883 -q 1 \
            -u "$$MQTT_USERNAME" -P "$$MQTT_PASSWORD" -t "$$1" -m "$$2"
        }

        echo "mqtt-rules: unlock <- $$BUTTON_TOPIC"
        echo "mqtt-rules: chime  <- $$DING_TOPIC"

        last_chime=0
        last_unlock=0

        mosquitto_sub -h mosquitto -p 1883 -q 1 \
          -u "$$MQTT_USERNAME" -P "$$MQTT_PASSWORD" \
          -t "$$BUTTON_TOPIC" -t "$$DING_TOPIC" -v \
        | while read -r topic payload; do
            now=$$(date +%s)
            case "$$topic" in
              "$$BUTTON_TOPIC")
                case "$$payload" in
                  *'"action":""'*|*'"action":"release"'*) continue ;;
                  *'"action":"'*)
                    [ $$((now - last_unlock)) -lt 3 ] && continue
                    last_unlock=$$now
                    echo "unlock: $$payload"
                    pub "$$LOCK_TOPIC" "UNLOCK"
                    ;;
                esac
                ;;
              *)
                if [ "$$payload" = "ON" ] && [ $$((now - last_chime)) -ge 15 ]; then
                  last_chime=$$now
                  echo "chime: ding ON"
                  pub "$$CHIME_TOPIC" "$$now"
                fi
                ;;
            esac
          done

        echo "mqtt-rules: subscriber exited; container will restart"
        exit 1
    networks:
      - proxy_net

  influxdb:
    # Stay on the 2.x line — influxdb:latest is InfluxDB 3, a different product
    # with an incompatible API.
    image: influxdb:2.9
    container_name: influxdb
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE}
      # Setup runs only against an empty influxdb_data volume. Editing these
      # afterwards does nothing — changing org/bucket/token later means the
      # influx CLI, or wiping the volume.
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      # Sensor readings are tiny; keep them indefinitely.
      - DOCKER_INFLUXDB_INIT_RETENTION=0
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - proxy_net

  telegraf:
    image: telegraf:1.39
    container_name: telegraf
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_started
      # First-boot setup takes a few seconds; waiting avoids a burst of write
      # errors before the token exists.
      influxdb:
        condition: service_healthy
    environment:
      - TZ=${TIMEZONE}
      # Mosquitto has allow_anonymous false — telegraf logs in like any client.
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    networks:
      - proxy_net

  grafana:
    image: grafana/grafana:13.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      - TZ=${TIMEZONE}
      # Applied on first boot only; after that the password lives in grafana.db
      # (reset with `grafana-cli admin reset-admin-password`).
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      # Behind Caddy: without this, login redirects and generated links point
      # at the container's own address.
      - GF_SERVER_ROOT_URL=https://grafana.${DOMAIN}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      # Interpolated into the provisioned datasource at startup.
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - proxy_net

volumes:
  mosquitto_data:
  esphome_config:
  z2m_baixos_data:
  z2m_pis_data:
  ring_data:
  influxdb_data:
  influxdb_config:
  grafana_data:

networks:
  proxy_net:
    external: true
