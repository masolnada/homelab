services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    environment:
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
    # Renders the password file from the environment at start; the image has
    # no env substitution of its own.
    command: >
      sh -c 'rm -f /mosquitto/passwd
      && mosquitto_passwd -c -b /mosquitto/passwd "$$MQTT_USERNAME" "$$MQTT_PASSWORD"
      && chown mosquitto:mosquitto /mosquitto/passwd
      && chmod 0600 /mosquitto/passwd
      && exec mosquitto -c /mosquitto/config/mosquitto.conf'
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    networks:
      - proxy_net

  esphome:
    image: ghcr.io/esphome/esphome:latest
    container_name: esphome
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE}
      # mDNS does not cross the bridge network; check device reachability by
      # ping instead (was usePing on the old NixOS host).
      - ESPHOME_DASHBOARD_USE_PING=true
    volumes:
      - esphome_config:/config
    networks:
      - proxy_net

  z2m-baixos:
    image: ghcr.io/koenkk/zigbee2mqtt:2.6.2
    container_name: z2m-baixos
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      - TZ=${TIMEZONE}
      # Skip the first-boot onboarding UI; config comes from the env vars below.
      - Z2M_ONBOARD_NO_SERVER=1
      # SLZB-06P7 network coordinator "zb-coord-baixos" (CC2652P7 → zstack, TCP)
      - ZIGBEE2MQTT_CONFIG_SERIAL_PORT=tcp://10.0.20.6:6638
      - ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER=zstack
      - ZIGBEE2MQTT_CONFIG_MQTT_SERVER=mqtt://mosquitto:1883
      - ZIGBEE2MQTT_CONFIG_MQTT_USER=${MQTT_USERNAME}
      - ZIGBEE2MQTT_CONFIG_MQTT_PASSWORD=${MQTT_PASSWORD}
      - ZIGBEE2MQTT_CONFIG_MQTT_BASE_TOPIC=zigbee2mqtt-baixos
      - ZIGBEE2MQTT_CONFIG_FRONTEND_ENABLED=true
      - ZIGBEE2MQTT_CONFIG_FRONTEND_PORT=8080
      # Raw MQTT JSON only — no Home Assistant discovery.
      - ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED=false
      # Per-coordinator network identity. Concrete values in .env — never
      # GENERATE here: env overrides re-apply every boot and would re-form
      # the network (orphaning all paired devices) on each restart.
      - ZIGBEE2MQTT_CONFIG_ADVANCED_NETWORK_KEY=${Z2M_BAIXOS_NETWORK_KEY}
      - ZIGBEE2MQTT_CONFIG_ADVANCED_PAN_ID=${Z2M_BAIXOS_PAN_ID}
      - ZIGBEE2MQTT_CONFIG_ADVANCED_EXT_PAN_ID=${Z2M_BAIXOS_EXT_PAN_ID}
    volumes:
      - z2m_baixos_data:/app/data
    networks:
      - proxy_net

  z2m-pis:
    image: ghcr.io/koenkk/zigbee2mqtt:2.6.2
    container_name: z2m-pis
    restart: unless-stopped
    depends_on:
      - mosquitto
    environment:
      - TZ=${TIMEZONE}
      # Skip the first-boot onboarding UI; config comes from the env vars below.
      - Z2M_ONBOARD_NO_SERVER=1
      # SLZB-06P7 network coordinator "zb-coord-pis" (CC2652P7 → zstack, TCP)
      - ZIGBEE2MQTT_CONFIG_SERIAL_PORT=tcp://10.0.20.5:6638
      - ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER=zstack
      - ZIGBEE2MQTT_CONFIG_MQTT_SERVER=mqtt://mosquitto:1883
      - ZIGBEE2MQTT_CONFIG_MQTT_USER=${MQTT_USERNAME}
      - ZIGBEE2MQTT_CONFIG_MQTT_PASSWORD=${MQTT_PASSWORD}
      - ZIGBEE2MQTT_CONFIG_MQTT_BASE_TOPIC=zigbee2mqtt-pis
      - ZIGBEE2MQTT_CONFIG_FRONTEND_ENABLED=true
      - ZIGBEE2MQTT_CONFIG_FRONTEND_PORT=8080
      # Raw MQTT JSON only — no Home Assistant discovery.
      - ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED=false
      # Per-coordinator network identity. Concrete values in .env — never
      # GENERATE here: env overrides re-apply every boot and would re-form
      # the network (orphaning all paired devices) on each restart.
      - ZIGBEE2MQTT_CONFIG_ADVANCED_NETWORK_KEY=${Z2M_PIS_NETWORK_KEY}
      - ZIGBEE2MQTT_CONFIG_ADVANCED_PAN_ID=${Z2M_PIS_PAN_ID}
      - ZIGBEE2MQTT_CONFIG_ADVANCED_EXT_PAN_ID=${Z2M_PIS_EXT_PAN_ID}
      # Baixos sits on the default channel 11; keep the two networks apart.
      - ZIGBEE2MQTT_CONFIG_ADVANCED_CHANNEL=15
    volumes:
      - z2m_pis_data:/app/data
    networks:
      - proxy_net

  influxdb:
    # Stay on the 2.x line — influxdb:latest is InfluxDB 3, a different product
    # with an incompatible API.
    image: influxdb:2.9
    container_name: influxdb
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE}
      # Setup runs only against an empty influxdb_data volume. Editing these
      # afterwards does nothing — changing org/bucket/token later means the
      # influx CLI, or wiping the volume.
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      # Sensor readings are tiny; keep them indefinitely.
      - DOCKER_INFLUXDB_INIT_RETENTION=0
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - proxy_net

  telegraf:
    image: telegraf:1.39
    container_name: telegraf
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_started
      # First-boot setup takes a few seconds; waiting avoids a burst of write
      # errors before the token exists.
      influxdb:
        condition: service_healthy
    environment:
      - TZ=${TIMEZONE}
      # Mosquitto has allow_anonymous false — telegraf logs in like any client.
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    networks:
      - proxy_net

  grafana:
    image: grafana/grafana:13.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      - TZ=${TIMEZONE}
      # Applied on first boot only; after that the password lives in grafana.db
      # (reset with `grafana-cli admin reset-admin-password`).
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      # Behind Caddy: without this, login redirects and generated links point
      # at the container's own address.
      - GF_SERVER_ROOT_URL=https://grafana.${DOMAIN}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      # Interpolated into the provisioned datasource at startup.
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - proxy_net

volumes:
  mosquitto_data:
  esphome_config:
  z2m_baixos_data:
  z2m_pis_data:
  influxdb_data:
  influxdb_config:
  grafana_data:

networks:
  proxy_net:
    external: true
