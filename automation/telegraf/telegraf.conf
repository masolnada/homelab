# Bridges Zigbee2MQTT device reports from Mosquitto into InfluxDB.

[agent]
  interval = "10s"
  flush_interval = "10s"
  # The container hostname is a random id that changes on every recreate; a
  # hostname tag would fragment the series for no benefit.
  omit_hostname = true

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  # Single-level "+" is deliberate: it matches <base>/<device> device reports
  # only, skipping <base>/bridge/... and <base>/<device>/availability, which
  # are deeper and/or not device JSON.
  topics = [
    "zigbee2mqtt-baixos/+",
    "zigbee2mqtt-pis/+",
  ]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  client_id = "telegraf"
  qos = 0

  # base_topic and device are parsed out of the topic below, so the default
  # "topic" tag would only duplicate them.
  topic_tag = ""

  # The classic json parser keeps numeric values and drops strings and
  # booleans silently. That is what we want here: every field lands as a
  # float, so no device can create a type conflict in InfluxDB. The cost is
  # that non-numeric state (action, contact, occupancy, update.state) never
  # reaches InfluxDB — to capture those for a future door or motion sensor,
  # add json_string_fields plus a processors.enum to map them onto numbers.
  data_format = "json"
  name_override = "zigbee"

  # zigbee2mqtt-baixos/marcscave-temp-sensor
  #   → tags: base_topic=zigbee2mqtt-baixos, device=marcscave-temp-sensor
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "+/+"
    tags = "base_topic/device"

# Bridges ESPHome devices that talk to Mosquitto directly (not through
# zigbee2mqtt). Their switch state payloads are bare "ON"/"OFF" strings, not
# JSON, so this needs its own parser rather than reusing the block above.
[[inputs.mqtt_consumer]]
  name_override = "esphome_switch"
  servers = ["tcp://mosquitto:1883"]
  topics = [
    "llum-ventilador-marcscave/switch/llum_ventilador_marcscave_relay_a/state",
    "llum-ventilador-marcscave/switch/llum_ventilador_marcscave_relay_b/state",
  ]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  client_id = "telegraf-esphome-switch"
  qos = 0
  topic_tag = ""
  data_format = "value"
  data_type = "string"

  # llum-ventilador-marcscave/switch/llum_ventilador_marcscave_relay_a/state
  #   → tags: device=llum-ventilador-marcscave, entity=llum_ventilador_marcscave_relay_a
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "+/+/+/+"
    tags = "device//entity/"

# Shelly Pro 3EM three-phase energy meter. It speaks Shelly's own Gen2 MQTT
# schema (not zigbee2mqtt's, not ESPHome's), so it needs its own input.
#
# Channel assignment (physical CT clamps, see the dashboard for the labels):
#   A = whole-flat consumption   B = fireplace fan   C = water heater
#
# Instantaneous values. Shelly republishes this on every internal sample, so
# it arrives far faster than the 10s agent interval — telegraf keeps the last
# message per flush, which is the right behaviour for a gauge.
[[inputs.mqtt_consumer]]
  name_override = "shelly_em"
  servers = ["tcp://mosquitto:1883"]
  topics = ["shellypro3em-34987a44fb48/status/em:0"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  client_id = "telegraf-shelly-em"
  qos = 0
  topic_tag = ""
  # "id" is the emeter component index (always 0 on a single-meter unit), not
  # a measurement. Dropping it keeps the measurement to real readings.
  fielddrop = ["id"]

  # Same classic json parser as the zigbee input: numeric fields only. That
  # silently drops "n_current" (null on this unit — no neutral clamp fitted)
  # and "user_calibrated_phase" (an array), neither of which is plottable.
  data_format = "json"

  # shellypro3em-34987a44fb48/status/em:0 → tags: device=shellypro3em-34987a44fb48
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "+/+/+"
    tags = "device//"

# Cumulative lifetime energy counters, published about once a minute. Kept in
# a separate measurement because these are monotonic totals in watt-hours —
# mixing them with the gauges above would make "select all fields" panels
# meaningless. Grafana derives kWh-per-period from these with difference().
[[inputs.mqtt_consumer]]
  name_override = "shelly_emdata"
  servers = ["tcp://mosquitto:1883"]
  topics = ["shellypro3em-34987a44fb48/status/emdata:0"]
  username = "${MQTT_USERNAME}"
  password = "${MQTT_PASSWORD}"
  client_id = "telegraf-shelly-emdata"
  qos = 0
  topic_tag = ""
  data_format = "json"
  fielddrop = ["id"]

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "+/+/+"
    tags = "device//"

# Maps the ON/OFF string onto a 0/1 float so it plots directly against
# numeric series (e.g. temperature) without a Grafana-side conversion.
[[processors.enum]]
  namepass = ["esphome_switch"]
  [[processors.enum.mapping]]
    fields = ["value"]
    dest = "state"
    [processors.enum.mapping.value_mappings]
      ON = 1.0
      OFF = 0.0

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET}"
