# Plain MQTT — ESPHome devices (kc868-a8, shellies, ...) reach this on
# 10.0.20.20:1883, a secondary IP of the homelab VM kept from the old
# gordi broker so devices never needed reflashing.
listener 1883
protocol mqtt

# MQTT over WebSockets — browser clients. The gateway Caddy proxies
# wss://mqtt.<DOMAIN> to mosquitto:9001 for the hort fertigation dashboard.
listener 9001
protocol websockets

allow_anonymous false
password_file /mosquitto/passwd

persistence true
persistence_location /mosquitto/data/
