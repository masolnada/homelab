services:
  cli-proxy-api:
    image: eceasy/cli-proxy-api:latest@sha256:5f261f6ca5505fbe4ba0bc30cc615a4d3925c99ad6ae686411e43cf32135bb5d
    container_name: cli-proxy-api
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE}
    volumes:
      - ./config.yaml:/CLIProxyAPI/config.yaml
      - ./auths:/root/.cli-proxy-api
      - ./logs:/CLIProxyAPI/logs
    networks:
      - proxy_net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  cpa-usage-keeper:
    image: ghcr.io/willxup/cpa-usage-keeper:latest@sha256:0b6a62d805a98b3d403f68be9bdf3d1caf00159204f60ac9783b3dfef35c7e48
    container_name: cpa-usage-keeper
    restart: unless-stopped
    depends_on:
      - cli-proxy-api
    environment:
      - TZ=${TIMEZONE}
      - CPA_BASE_URL=http://cli-proxy-api:8317
      - REDIS_QUEUE_ADDR=cli-proxy-api:8317
      - CPA_MANAGEMENT_KEY=${CPA_MANAGEMENT_KEY}
      - AUTH_ENABLED=true
      - LOGIN_PASSWORD=${KEEPER_LOGIN_PASSWORD}
    volumes:
      - ./keeper:/data
    networks:
      - proxy_net
    labels:
      - docker-volume-backup.stop-during-backup=cpa
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  backup:
    image: offen/docker-volume-backup:latest@sha256:8eaf987d83e7b5f7c4edd8d177c2ca74b49a0d015d241e99a260c19a043b46aa
    container_name: cpa-backup
    restart: unless-stopped
    environment:
      - BACKUP_CRON_EXPRESSION=0 3 * * *
      - BACKUP_RETENTION_DAYS=30
      - BACKUP_FILENAME=cpa-%Y-%m-%dT%H-%M-%S.tar.gz
      - BACKUP_ARCHIVE=/archive/cpa
      - BACKUP_STOP_DURING_BACKUP_LABEL=cpa
      - TZ=${TIMEZONE}
    volumes:
      - ./auths:/backup/cpa-auths:ro
      - ./keeper:/backup/cpa-keeper:ro
      - nas_backup:/archive
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /usr/share/zoneinfo:/usr/share/zoneinfo:ro
    networks:
      - proxy_net

volumes:
  nas_backup:
    driver: local
    driver_opts:
      type: cifs
      device: //${NAS_IP}/${NAS_BACKUP_SHARE}
      o: addr=${NAS_IP},username=${NAS_BACKUP_USER},password=${NAS_BACKUP_PASSWORD},file_mode=0700,dir_mode=0700

networks:
  proxy_net:
    external: true
