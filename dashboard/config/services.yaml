- Infrastructure:
    - TrueNAS:
        icon: truenas
        href: "{{HOMEPAGE_VAR_TRUENAS_URL}}"
        widget:
          type: truenas
          url: "{{HOMEPAGE_VAR_TRUENAS_URL}}"
          key: "{{HOMEPAGE_VAR_TRUENAS_KEY}}"
          enablePools: true
    - Caddy:
        icon: caddy
        href: https://home.{{HOMEPAGE_VAR_DOMAIN}}
        widget:
          type: caddy
          url: http://tailscale-gateway:2019
        server: my-docker
        container: caddy
    - Tailscale:
        icon: tailscale
        href: https://login.tailscale.com/admin/machines?refreshed=true
        server: my-docker
        container: tailscale-gateway
    - Proxmox:
        icon: proxmox
        href: https://pve.home.lab:8006/
    - OPNsense:
        icon: opnsense
        href: https://192.168.10.1/
    - Omada:
        icon: omada
        href: https://192.168.1.20:8043/#dashboardGlobal
    - go2rtc:
        icon: go2rtc
        href: http://100.71.96.101:1984/
        siteMonitor: http://100.71.96.101:1984/api

- Media:
    - Navidrome:
        icon: navidrome
        href: https://music.{{HOMEPAGE_VAR_DOMAIN}}
        widget:
          type: navidrome
          url: https://music.{{HOMEPAGE_VAR_DOMAIN}}
          user: "{{HOMEPAGE_VAR_NAVIDROME_USER}}"
          token: "{{HOMEPAGE_VAR_NAVIDROME_TOKEN}}"
          salt: "{{HOMEPAGE_VAR_NAVIDROME_SALT}}"
        server: my-docker
        container: navidrome
    - Immich:
        icon: immich
        href: https://photos.{{HOMEPAGE_VAR_DOMAIN}}
        widget:
          type: immich
          url: http://immich-server:2283
          key: "{{HOMEPAGE_VAR_IMMICH_API_KEY}}"
          version: 2
        server: my-docker
        container: immich-server

- Services:
    - Vaultwarden:
        icon: vaultwarden
        href: https://vault.{{HOMEPAGE_VAR_DOMAIN}}
        siteMonitor: http://vaultwarden:80
        server: my-docker
        container: vaultwarden
    - IHateMoney:
        icon: si-cashapp
        href: https://money.{{HOMEPAGE_VAR_DOMAIN}}
        siteMonitor: http://ihatemoney:8000
        server: my-docker
        container: ihatemoney
    - Radicale:
        icon: radicale
        href: https://contacts.{{HOMEPAGE_VAR_DOMAIN}}
        siteMonitor: http://radicale:5232
        server: my-docker
        container: radicale
    - Silverbullet:
        icon: si-markdown
        href: https://notes.{{HOMEPAGE_VAR_DOMAIN}}
        siteMonitor: http://silverbullet:3000
        server: my-docker
        container: silverbullet
    - WebDAV:
        icon: si-webdav
        href: https://webdav.{{HOMEPAGE_VAR_DOMAIN}}
        siteMonitor: http://webdav:6065
        server: my-docker
        container: webdav
    - Markcards:
        icon: si-anki
        href: https://markcards.dev.marcsolanadal.com
    - Agent:
        icon: https://hermes-agent.nousresearch.com/docs/img/logo.png
        href: https://agent.{{HOMEPAGE_VAR_DOMAIN}}
        siteMonitor: http://agent:9119
        server: my-docker
        container: agent

- Garden:
    - Hort:
        icon: mdi-sprinkler-variant
        href: https://hort.{{HOMEPAGE_VAR_DOMAIN}}
        description: Fertigation system
        siteMonitor: http://hort:80
        server: my-docker
        container: hort
