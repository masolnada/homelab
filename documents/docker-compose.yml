services:
  paperless-ngx:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless-ngx
    restart: unless-stopped
    depends_on:
      - paperless-redis
    environment:
      - PAPERLESS_REDIS=redis://paperless-redis:6379
      - PAPERLESS_SECRET_KEY=${PAPERLESS_SECRET_KEY}
      - PAPERLESS_ADMIN_USER=${PAPERLESS_ADMIN_USER}
      - PAPERLESS_ADMIN_PASSWORD=${PAPERLESS_ADMIN_PASSWORD}
      - PAPERLESS_TIME_ZONE=${TIMEZONE}
      - PAPERLESS_OCR_MODE=force
      - PAPERLESS_TASK_WORKERS=2
      - PAPERLESS_THREADS_PER_WORKER=2
      - PAPERLESS_URL=${PAPERLESS_URL}
      - PAPERLESS_FILENAME_FORMAT={{ created_year }}/{{ correspondent|lower|replace(" ","-") }}/{{ created }}-{{ correspondent|lower|replace(" ","-") }}-{{ title|lower|replace(" ","-") }}
    volumes:
      - paperless_data:/usr/src/paperless/data
      - nas_documents:/usr/src/paperless/media
      - paperless_export:/usr/src/paperless/export
      - paperless_consume:/usr/src/paperless/consume
    networks:
      - proxy_net

  paperless-redis:
    image: redis:alpine
    container_name: paperless-redis
    restart: unless-stopped
    volumes:
      - paperless_redis:/data
    networks:
      - proxy_net

  kavita:
    image: ghcr.io/kareadita/kavita:latest
    container_name: kavita
    restart: unless-stopped
    volumes:
      - kavita_config:/kavita/config
      - nas_documents:/media:ro
    networks:
      - proxy_net

volumes:
  paperless_data:
  paperless_export:
  paperless_consume:
  paperless_redis:
  kavita_config:
  nas_documents:
    driver: local
    driver_opts:
      type: cifs
      device: //${NAS_IP}/${NAS_DOCUMENTS_SHARE}
      o: addr=${NAS_IP},username=${NAS_DOCUMENTS_USER},password=${NAS_DOCUMENTS_PASSWORD},file_mode=0664,dir_mode=0775,uid=1000,gid=1000

networks:
  proxy_net:
    external: true
