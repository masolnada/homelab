services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    environment:
      - TZ=${TIMEZONE}
      - HERMES_DASHBOARD=1
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_KEY=${HERMES_API_KEY}
    volumes:
      - agent_data:/opt/data
    networks:
      - proxy_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8642/health && curl -fsS http://localhost:9119/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  workspace:
    image: ghcr.io/outsourc-e/hermes-workspace:latest
    container_name: hermes-workspace
    restart: unless-stopped
    depends_on:
      hermes:
        condition: service_healthy
    environment:
      - TZ=${TIMEZONE}
      - HERMES_HOME=/home/workspace/.hermes
      - HERMES_WORKSPACE_DIR=/workspace
      - HERMES_API_URL=http://hermes:8642
      - HERMES_DASHBOARD_URL=http://hermes:9119
      - HERMES_API_TOKEN=${HERMES_API_KEY}
      - HERMES_PASSWORD=${HERMES_WORKSPACE_PASSWORD}
      - COOKIE_SECURE=1
      - TRUST_PROXY=1
    volumes:
      - agent_data:/home/workspace/.hermes
      - workspace_files:/workspace
    networks:
      - proxy_net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  backup:
    image: offen/docker-volume-backup:latest@sha256:26df48fdb7bd32f114fc7420beae3960055ae1f40ba5ff3bfd787cb5f15fefa5
    container_name: hermes-backup
    restart: unless-stopped
    environment:
      - BACKUP_CRON_EXPRESSION=0 3 * * *
      - BACKUP_RETENTION_DAYS=30
      - BACKUP_FILENAME=agent-%Y-%m-%dT%H-%M-%S.tar.gz
      - BACKUP_ARCHIVE=/archive/agent
      - TZ=${TIMEZONE}
    volumes:
      - agent_data:/backup/agent_data:ro
      - workspace_files:/backup/workspace_files:ro
      - nas_backup:/archive
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /usr/share/zoneinfo:/usr/share/zoneinfo:ro
    networks:
      - proxy_net

volumes:
  agent_data:
  workspace_files:
  nas_backup:
    driver: local
    driver_opts:
      type: cifs
      device: //${NAS_IP}/${NAS_BACKUP_SHARE}
      o: addr=${NAS_IP},username=${NAS_BACKUP_USER},password=${NAS_BACKUP_PASSWORD},file_mode=0700,dir_mode=0700

networks:
  proxy_net:
    external: true
